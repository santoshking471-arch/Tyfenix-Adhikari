<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Login</title>
<style>
    /* Full-screen gradient background */
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: Arial, sans-serif;
        background: linear-gradient(to bottom, #1e3c72, #2a5298); /* Blue gradient */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Login card */
    .login-card {
        width: 90%;
        max-width: 400px;
        background-color: #ffffffdd;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        text-align: center;
    }

    /* Header */
    .login-card h2 {
        margin-bottom: 20px;
        color: #0b2e6f;
    }

    /* Input fields */
    .login-card input[type="email"],
    .login-card input[type="password"] {
        width: 100%;
        padding: 15px 20px;
        margin: 10px 0;
        border-radius: 50px;
        border: 1px solid #0b2e6f;
        font-size: 16px;
        outline: none;
    }

    /* Buttons */
    .login-card button {
        width: 100%;
        padding: 15px;
        margin: 15px 0;
        border-radius: 50px;
        border: none;
        background-color: #0b2e6f;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        transition: background 0.3s;
    }

    .login-card button:hover {
        background-color: #15509b;
    }

    /* Register link */
    .register-link {
        color: #0b2e6f;
        text-decoration: none;
        display: block;
        margin-bottom: 15px;
    }

    /* Error message */
    #errorMsg {
        color: red;
        font-size: 14px;
    }

    /* Helpline buttons */
    .helpline {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 10px;
    }

    .helpline a {
        padding: 10px 15px;
        border-radius: 10px;
        text-decoration: none;
        color: #fff;
        background-color: #0b2e6f;
        font-weight: bold;
        transition: background 0.3s;
    }

    .helpline a:hover {
        background-color: #15509b;
    }

    /* Footer text */
    .footer-text {
        font-size: 12px;
        color: #333;
        margin-top: 10px;
    }
</style>
</head>
<body>

<div class="login-card">
    <h2>Staff Login</h2>
    <input type="email" id="staffEmail" placeholder="Email ID" />
    <input type="password" id="staffPassword" placeholder="Password" />
    <div id="errorMsg"></div>
    <button onclick="staffLogin()">Login</button>
    <a href="register.html" class="register-link">New Member → Register</a>

    <div class="helpline">
        <a href="https://wa.me/918817409243" target="_blank">WhatsApp</a>
        <a href="https://www.instagram.com/tyfenix?igsh=dHl5bjJoOWJ6c3Vx" target="_blank">Instagram</a>
    </div>

    <div class="footer-text">
        Helpline: 8817409243
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"></script>
<script>
  // Firebase config (replace with your config)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "SENDER_ID",
    appId: "APP_ID"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  function staffLogin() {
    const email = document.getElementById("staffEmail").value;
    const password = document.getElementById("staffPassword").value;
    const errorMsg = document.getElementById("errorMsg");

    auth.signInWithEmailAndPassword(email, password)
    .then((userCredential) => {
      const user = userCredential.user;

      db.collection("staff").doc(user.uid).get()
        .then(doc => {
          if(doc.exists){
            // Staff confirmed
            window.location.href = "staffDashboard.html";
          } else {
            errorMsg.innerText = "Access Denied. Not a staff member.";
            auth.signOut();
          }
        });
    })
    .catch((error) => {
      errorMsg.innerText = error.message;
    });
  }
</script>

</body>
</html>
